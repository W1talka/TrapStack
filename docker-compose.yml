services:
  trapstack:
    container_name: trapstack
    build: .
    restart: always
    network_mode: host
    volumes:
      - "/opt/crowdsec/conf:/opt/crowdsec/conf"
      - "/opt/npmplus/nginx/logs:/opt/npmplus/nginx/logs:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    env_file:
      - .env
    environment:
      - "TZ=America/New_York"
