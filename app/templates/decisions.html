{% extends "base.html" %}
{% block title %}Decisions - CrowdSec GUI{% endblock %}

{% block content %}
<div class="p-6 space-y-6">
    <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold text-white">Decisions</h2>
        <span class="text-sm text-cs-muted">{{ decisions|length }} active</span>
    </div>

    {% if error %}
    <div class="px-4 py-3 rounded-lg bg-cs-danger/20 text-red-300 border border-cs-danger/30 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <!-- Add Ban Form -->
    <div class="bg-cs-card rounded-xl border border-cs-border p-5">
        <h3 class="text-sm font-semibold text-white mb-4">Add Manual Ban</h3>
        <form method="POST" action="{{ url_for('decisions.add') }}" class="flex flex-wrap gap-3 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs text-cs-muted mb-1">IP / Range</label>
                <input type="text" name="ip" placeholder="192.168.1.100 or 10.0.0.0/24"
                       required
                       class="w-full px-3 py-2 bg-cs-bg border border-cs-border rounded-lg text-white text-sm
                              focus:outline-none focus:border-cs-accent focus:ring-1 focus:ring-cs-accent">
            </div>
            <div class="w-36">
                <label class="block text-xs text-cs-muted mb-1">Duration</label>
                <select name="duration"
                        class="w-full px-3 py-2 bg-cs-bg border border-cs-border rounded-lg text-white text-sm
                               focus:outline-none focus:border-cs-accent">
                    <option value="1h">1 hour</option>
                    <option value="4h" selected>4 hours</option>
                    <option value="12h">12 hours</option>
                    <option value="24h">24 hours</option>
                    <option value="7d">7 days</option>
                    <option value="30d">30 days</option>
                    <option value="8760h">1 year</option>
                </select>
            </div>
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs text-cs-muted mb-1">Reason</label>
                <input type="text" name="reason" value="Manual ban via GUI" placeholder="Reason for ban"
                       class="w-full px-3 py-2 bg-cs-bg border border-cs-border rounded-lg text-white text-sm
                              focus:outline-none focus:border-cs-accent focus:ring-1 focus:ring-cs-accent">
            </div>
            <button type="submit"
                    class="px-4 py-2 bg-cs-danger hover:bg-red-600 text-white rounded-lg text-sm font-medium transition-colors">
                Ban
            </button>
        </form>
    </div>

    <!-- Search -->
    <div class="flex gap-3">
        <form method="GET" action="{{ url_for('decisions.index') }}" class="flex-1 flex gap-2">
            <input type="text" name="search" value="{{ search }}" placeholder="Search by IP, scenario, or origin..."
                   class="flex-1 px-3 py-2 bg-cs-card border border-cs-border rounded-lg text-white text-sm
                          focus:outline-none focus:border-cs-accent focus:ring-1 focus:ring-cs-accent">
            <button type="submit"
                    class="px-4 py-2 bg-cs-accent hover:bg-blue-600 text-white rounded-lg text-sm font-medium transition-colors">
                Search
            </button>
            {% if search %}
            <a href="{{ url_for('decisions.index') }}"
               class="px-4 py-2 bg-cs-border hover:bg-cs-muted/30 text-white rounded-lg text-sm font-medium transition-colors">
                Clear
            </a>
            {% endif %}
        </form>
    </div>

    <!-- Decisions Table -->
    <div id="decisions-table">
        {% include "partials/decisions_table.html" %}
    </div>
</div>
{% endblock %}
