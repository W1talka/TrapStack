{% extends "base.html" %}
{% block title %}Dashboard - CrowdSec GUI{% endblock %}

{% block content %}
<div class="p-6 space-y-6">
    <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold text-white">Dashboard</h2>
        <span class="text-xs text-cs-muted">Auto-refreshes every 30s</span>
    </div>

    {% if error %}
    <div class="px-4 py-3 rounded-lg bg-cs-danger/20 text-red-300 border border-cs-danger/30 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <!-- Stats Cards -->
    <div id="dashboard-stats"
         hx-get="{{ url_for('dashboard.partial_stats') }}"
         hx-trigger="every 30s"
         hx-swap="innerHTML">
        {% include "partials/dashboard_stats.html" %}
    </div>
</div>
{% endblock %}
