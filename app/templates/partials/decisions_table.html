<div class="card bg-base-200 shadow-sm">
    <div class="overflow-x-auto">
        <table class="table table-zebra">
            <thead>
                <tr>
                    <th>IP</th>
                    <th>Scenario</th>
                    <th>Action</th>
                    <th class="hidden sm:table-cell">Origin</th>
                    <th class="hidden md:table-cell">Scope</th>
                    <th>Expiry</th>
                    <th class="w-20"></th>
                </tr>
            </thead>
            <tbody>
                {% for d in decisions %}
                <tr class="hover" id="decision-{{ d.id }}">
                    <td class="font-mono">{{ d.value }}</td>
                    <td class="text-base-content/60" title="{{ d.scenario }}">
                        {{ d.scenario.split('/')[-1] if d.scenario and '/' in d.scenario else d.scenario }}
                    </td>
                    <td>
                        <span class="badge badge-sm
                            {% if d.type == 'ban' %}badge-error
                            {% elif d.type == 'captcha' %}badge-warning
                            {% else %}badge-info{% endif %}">
                            {{ d.type }}
                        </span>
                    </td>
                    <td class="hidden sm:table-cell text-base-content/60">{{ d.origin }}</td>
                    <td class="hidden md:table-cell text-base-content/60">{{ d.scope }}</td>
                    <td class="text-base-content/60">{{ d.duration }}</td>
                    <td>
                        <button hx-delete="/decisions/delete/{{ d.id }}"
                                hx-target="#decisions-table"
                                hx-swap="innerHTML"
                                hx-confirm="Remove ban on {{ d.value }}?"
                                class="btn btn-error btn-outline btn-xs">
                            Remove
                        </button>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="7" class="text-center text-base-content/60 py-8">No active decisions</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
